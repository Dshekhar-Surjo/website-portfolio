<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A9EF0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B5CF0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="52" x2="400" y2="52" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="104" x2="400" y2="104" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="156" x2="400" y2="156" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="208" x2="400" y2="208" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="260" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="260" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="260" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="260" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Accent bar top -->
  <rect width="400" height="3" fill="url(#accent)"/>
  <!-- Scorecard rows -->
  <rect x="28" y="60" width="344" height="34" rx="4" fill="rgba(74,158,240,0.12)" stroke="rgba(74,158,240,0.25)" stroke-width="0.5"/>
  <rect x="28" y="102" width="344" height="34" rx="4" fill="rgba(123,92,240,0.12)" stroke="rgba(123,92,240,0.25)" stroke-width="0.5"/>
  <rect x="28" y="144" width="344" height="34" rx="4" fill="rgba(74,158,240,0.08)" stroke="rgba(74,158,240,0.15)" stroke-width="0.5"/>
  <!-- Check marks / scores -->
  <text x="50" y="83" font-family="monospace" font-size="14" fill="#4A9EF0">✓</text>
  <text x="50" y="125" font-family="monospace" font-size="14" fill="#7B5CF0">✓</text>
  <text x="50" y="167" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.3)">◯</text>
  <!-- Score bars -->
  <rect x="72" y="72" width="180" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="72" y="72" width="148" height="6" rx="3" fill="url(#accent)"/>
  <rect x="72" y="114" width="180" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="72" y="114" width="110" height="6" rx="3" fill="#7B5CF0"/>
  <rect x="72" y="156" width="180" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="72" y="156" width="70" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Score numbers -->
  <text x="268" y="81" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.7)">82%</text>
  <text x="268" y="123" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.7)">61%</text>
  <text x="268" y="165" font-family="monospace" font-size="11" fill="rgba(255,255,255,0.3)">39%</text>
  <!-- Main label -->
  <text x="200" y="218" font-family="monospace" font-size="11" letter-spacing="3" fill="rgba(255,255,255,0.5)" text-anchor="middle">LLM MATH SEC</text>
  <text x="200" y="238" font-family="monospace" font-size="9" letter-spacing="2" fill="rgba(255,255,255,0.25)" text-anchor="middle">GENAI EVALUATION SCORECARD</text>
  <!-- Math symbols floating -->
  <text x="316" y="85" font-family="serif" font-size="22" fill="rgba(74,158,240,0.35)" font-style="italic">∑</text>
  <text x="340" y="130" font-family="serif" font-size="18" fill="rgba(123,92,240,0.35)" font-style="italic">π</text>
  <text x="304" y="165" font-family="serif" font-size="16" fill="rgba(74,158,240,0.25)" font-style="italic">∫</text>
</svg>
