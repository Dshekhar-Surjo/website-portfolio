<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <defs>
    <linearGradient id="vbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sphere" cx="40%" cy="35%" r="60%" fx="40%" fy="35%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#4A7AA0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1A3A5C;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#vbg)"/>
  <!-- Accent bar -->
  <rect width="400" height="3" fill="#4A7AA0"/>
  <!-- 360 sphere -->
  <ellipse cx="200" cy="120" rx="90" ry="90" fill="none" stroke="rgba(74,122,160,0.15)" stroke-width="1"/>
  <ellipse cx="200" cy="120" rx="90" ry="35" fill="none" stroke="rgba(74,122,160,0.2)" stroke-width="0.8"/>
  <ellipse cx="200" cy="120" rx="35" ry="90" fill="none" stroke="rgba(74,122,160,0.2)" stroke-width="0.8"/>
  <ellipse cx="200" cy="120" rx="75" ry="90" fill="none" stroke="rgba(74,122,160,0.12)" stroke-width="0.6"/>
  <!-- Horizon line -->
  <line x1="110" y1="120" x2="290" y2="120" stroke="rgba(74,122,160,0.3)" stroke-width="0.8"/>
  <!-- Play / 360 icon center -->
  <circle cx="200" cy="120" r="28" fill="rgba(74,122,160,0.25)" stroke="rgba(74,122,160,0.5)" stroke-width="1.5"/>
  <text x="200" y="126" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" font-weight="700" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">360°</text>
  <!-- Geometry lines suggestion -->
  <line x1="140" y1="80" x2="260" y2="80" stroke="rgba(201,168,76,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="140" y1="80" x2="200" y2="148" stroke="rgba(201,168,76,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="260" y1="80" x2="200" y2="148" stroke="rgba(201,168,76,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Small angle marker -->
  <path d="M148 80 Q156 94 164 94" fill="none" stroke="rgba(201,168,76,0.4)" stroke-width="1"/>
  <!-- Label -->
  <text x="200" y="218" font-family="monospace" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.45)" text-anchor="middle">360° VIDEO PRODUCTION</text>
  <text x="200" y="235" font-family="monospace" font-size="8" letter-spacing="2" fill="rgba(255,255,255,0.2)" text-anchor="middle">PEABODY HALL GEOMETRY TOUR</text>
</svg>
